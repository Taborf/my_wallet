name: my_wallet
description: Portfolio monitoring app with MWR calculation, multi-currency support, and real-time price updates.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  intl: ^0.19.0
  http: ^1.1.0
  csv: ^6.0.0
  fl_chart: ^0.64.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
